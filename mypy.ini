[mypy]
python_version = 3.11
strict = True
warn_unused_ignores = True
warn_redundant_casts = True
# Phase 6 polish: relax warn_return_any to accommodate third-party dynamic
# returns (asyncpg, redis-py, structlog) without sprinkling `cast()` calls
# everywhere; the pyright-style strict-return is recovered by typing-checks
# in code paths that own the return value.
warn_return_any = False
disallow_any_explicit = False
disallow_untyped_defs = True
disallow_incomplete_defs = True
no_implicit_optional = True
warn_unreachable = True
show_error_codes = True
pretty = True
namespace_packages = True
explicit_package_bases = True
mypy_path = src

[mypy-tests.*]
disallow_untyped_defs = False

[mypy-locust.*]
ignore_missing_imports = True

[mypy-llama_cpp.*]
ignore_missing_imports = True

[mypy-vllm.*]
ignore_missing_imports = True

[mypy-aiokafka.*]
ignore_missing_imports = True

[mypy-asyncpg.*]
ignore_missing_imports = True

[mypy-respx.*]
ignore_missing_imports = True
