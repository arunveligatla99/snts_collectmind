groups:
  - name: collectmind-slo
    interval: 15s
    rules:
      # Severity tier convention (Phase 5 standardization):
      # - severity: critical  -> SLO breach; pages immediately.
      # - severity: page      -> warning-tier; pre-breach indicator, paged
      #                          via Alertmanager grouping, suppressed when a
      #                          critical alert for the same alertname+service
      #                          is already firing (see alertmanager.yaml).
      # Every Phase 5 alert is critical because each measures a binding SLO.

      - alert: E2ELatencyBreach
        expr: histogram_quantile(0.95, sum(rate(collectmind_time_to_deploy_seconds_bucket[5m])) by (le)) > 12
        for: 5m
        labels:
          severity: critical
          slo: SC-001
          service: collectmind
        annotations:
          summary: "SC-001 breach: time-to-deploy p95 > 12s"
          description: "End-to-end policy-deployed latency p95 exceeded the 12-second SC-001 ceiling for 5 minutes."
          runbook_url: observability/runbooks/slo-001-latency.md

      - alert: SustainedIngestSuccessRateBreach
        expr: |
          (
            sum(rate(collectmind_policy_deployed_total[10m]))
              /
            clamp_min(sum(rate(collectmind_diagnostic_findings_received_total[10m])), 1)
          ) < 0.999
        for: 10m
        labels:
          severity: critical
          slo: SC-002
          service: collectmind
        annotations:
          summary: "SC-002 breach: end-to-end success rate < 99.9% under sustained ingest"
          description: "Ratio of deployed policies to received findings dropped below the 99.9% SC-002 target."
          runbook_url: observability/runbooks/slo-002-success-rate.md

      # SC-003 has two halves: error rate (this alert) and memory growth
      # (SoakMemoryGrowthBreach below). Both fire only against a soak workload;
      # the alert thresholds are scoped to a window that requires sustained
      # load before they can fire.
      - alert: SoakErrorRateBreach
        expr: |
          (
            sum(rate(collectmind_authentication_failure_total[10m]))
              +
            sum(collectmind_dead_letter_queue_depth)
          ) > 0.001 * clamp_min(sum(rate(collectmind_diagnostic_findings_received_total[10m])), 1)
        for: 30m
        labels:
          severity: critical
          slo: SC-003
          service: collectmind
        annotations:
          summary: "SC-003 breach: soak-tier error rate > 0.1%"
          description: "Soak-tier error rate (auth failures + dead-letter depth) exceeded the SC-003 0.1% ceiling for 30 minutes."
          runbook_url: observability/runbooks/slo-003-soak.md

      - alert: SoakMemoryGrowthBreach
        # SC-003's memory half: 24-hour delta of orchestration-api RSS
        # exceeds 5% of the starting RSS. The nightly workflow snapshots
        # RSS at run start and end and asserts the same ratio; this rule
        # is the in-flight observability surface in addition to the
        # post-run workflow assertion.
        expr: |
          (
            (max_over_time(process_resident_memory_bytes{job="orchestration-api"}[1h])
              - min_over_time(process_resident_memory_bytes{job="orchestration-api"}[24h]))
              /
            clamp_min(min_over_time(process_resident_memory_bytes{job="orchestration-api"}[24h]), 1)
          ) > 0.05
        for: 1h
        labels:
          severity: critical
          slo: SC-003
          service: collectmind
        annotations:
          summary: "SC-003 breach: orchestration-api RSS growth > 5% over 24h"
          description: "Resident memory of the orchestration-api process grew more than 5 percent over the rolling 24-hour window, breaching the SC-003 soak budget."
          runbook_url: observability/runbooks/slo-003-soak.md

      - alert: QueryLatencyBreach
        expr: histogram_quantile(0.95, sum(rate(collectmind_query_request_latency_seconds_bucket[5m])) by (le)) > 0.2
        for: 5m
        labels:
          severity: critical
          slo: SC-004
          service: collectmind
        annotations:
          summary: "SC-004 breach: query API p95 > 200ms"
          description: "Operator query API p95 latency exceeded the 200ms SC-004 ceiling for 5 minutes."
          runbook_url: observability/runbooks/slo-004-query-latency.md

      - alert: RecoveryFromOutageBreach
        expr: |
          (
            sum(rate(collectmind_diagnostic_findings_received_total[10m]))
              -
            sum(rate(collectmind_policy_outcome_total[10m]))
          ) > 0.1
        for: 5m
        labels:
          severity: critical
          slo: SC-005
          service: collectmind
        annotations:
          summary: "SC-005 breach: ingest-to-outcome backlog persisting > 5 minutes"
          description: "The system has not drained its outcome backlog within 5 minutes of recovery; FR-022a violated."
          runbook_url: observability/runbooks/slo-005-recovery.md

      - alert: DashboardLagBreach
        # Phase 5 replacement for the Phase 4 timestamp()-based predicate.
        # That predicate had an idle false-positive: under zero ingest the
        # counter has no recent sample so the lag appears infinite. The
        # replacement is anchored to scrape-target liveness (`up == 1`) and
        # the scrape duration histogram, both of which only have signal
        # while the target is reachable.
        expr: |
          (
            max(up{job="orchestration-api"}) == 1
            and
            max(scrape_duration_seconds{job="orchestration-api"}) > 10
          )
        for: 1m
        labels:
          severity: critical
          slo: SC-006
          service: collectmind
        annotations:
          summary: "SC-006 breach: dashboard scrape duration > 10s"
          description: "Prometheus scrape duration for the orchestration-api target exceeded the SC-006 10-second ceiling; the dashboard will reflect stale data."
          runbook_url: observability/runbooks/slo-006-dashboard-lag.md

      - alert: OutcomeWriteDelayBreach
        expr: histogram_quantile(0.95, sum(rate(collectmind_policy_outcome_write_delay_seconds_bucket[15m])) by (le)) > 300
        for: 5m
        labels:
          severity: critical
          slo: SC-010
          service: collectmind
        annotations:
          summary: "SC-010 breach: outcome write delay p95 > 5 minutes"
          description: "Wall-clock delay between collection-window close and outcome row written exceeded the SC-010 5-minute ceiling."
          runbook_url: observability/runbooks/slo-010-outcome-write-delay.md

      - alert: AvailabilityBreach
        expr: avg_over_time(up{job="orchestration-api"}[10m]) < 0.999
        for: 5m
        labels:
          severity: critical
          slo: SC-012
          service: collectmind
        annotations:
          summary: "SC-012 breach: orchestration-api availability < 99.9%"
          description: "Rolling 10-minute availability of the orchestration-api scrape target dropped below the SC-012 99.9% monthly target."
          runbook_url: observability/runbooks/slo-012-availability.md

  # Feature 002 Phase 13 T280: tenant-isolation observability surface.
  # Six alerts mirroring the binding contracts from Phases 9-12. Severity-tier
  # discipline per the feature-001 Phase 5 standardization:
  #   - page: pre-breach indicator / single-event-visible signal.
  #   - critical: SLO breach / burst pattern requiring immediate page.
  - name: collectmind-multi-tenant
    interval: 15s
    rules:

      # FR-016: paged when a tenant sustains rate-limit rejections > 10/s for 10 min.
      - alert: RatelimitSustainedThrottle
        expr: sum by (tenant_id) (rate(collectmind_ratelimit_throttled_total[5m])) > 10
        for: 10m
        labels:
          severity: page
          slo: FR-016
          service: collectmind
        annotations:
          summary: "FR-016: tenant sustained rate-limit throttle > 10 r/s for 10 min"
          description: "Tenant {{ $labels.tenant_id }} has sustained over 10 throttled requests per second for 10 minutes. Likely a noisy-neighbor incident (US2)."
          runbook_url: observability/runbooks/ratelimit-sustained-throttle.md

      # ADR-0008 Part 3: failure-CLOSED page when Redis-unavailable counter is non-zero
      # for 5 min. Distinct from RatelimitSustainedThrottle: this means the limiter is
      # broken, not the limiter is doing its job.
      - alert: RatelimitRedisUnavailable
        expr: sum(rate(collectmind_ratelimit_redis_unavailable_total[1m])) > 0
        for: 5m
        labels:
          severity: page
          slo: ADR-0008-Part-3
          service: collectmind
        annotations:
          summary: "ADR-0008 Part 3: rate-limiter Redis unavailable (failure-CLOSED engaged)"
          description: "The rate-limit middleware's Redis backend is unavailable; the failure-CLOSED 503 path has been engaged for 5+ minutes. The limiter is broken, not throttling."
          runbook_url: observability/runbooks/ratelimit-redis-unavailable.md

      # SC-013 single-invocation page: fires on any break-glass operator invocation so
      # ops sees every cross-tenant audit read within one scrape interval.
      # Preserves operator_subject + reason_code on the alert instance so
      # Alertmanager's group_by routes per-(operator, reason) tuple — single-event
      # visibility per Phase 13 review (recorded in docs/DECISIONS.md).
      - alert: BreakGlassInvoked
        expr: sum by (operator_subject, reason_code) (increase(collectmind_break_glass_invocation_total[1m])) > 0
        for: 0m
        labels:
          severity: page
          slo: SC-013
          service: collectmind
        annotations:
          summary: "SC-013: break-glass operator bypass invoked"
          description: "Operator {{ $labels.operator_subject }} invoked the FR-005a break-glass primitive with reason_code={{ $labels.reason_code }}. Audit row written; review the audit_events kind=break_glass entry for the target tenant and correlation_id."
          runbook_url: observability/runbooks/break-glass-invoked.md

      # SC-013 burst critical: fires when an operator's 5-min invocation rate exceeds
      # 0.05/sec (~ 15 invocations in 5 min). Distinct page volume from the single-
      # invocation alert: BreakGlassInvoked sees every event; this alert sees abuse
      # patterns AT a single operator subject.
      - alert: BreakGlassBurstInvocation
        expr: sum by (operator_subject) (rate(collectmind_break_glass_invocation_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          slo: SC-013
          service: collectmind
        annotations:
          summary: "SC-013 burst: break-glass invocations > 15 per 5 min from one operator"
          description: "Operator {{ $labels.operator_subject }} sustained > 0.05 break-glass invocations per second over 5 minutes. Possible operator-key compromise; rotate credentials and review audit_events for affected tenants."
          runbook_url: observability/runbooks/break-glass-burst-invocation.md

      # SC-014: tenant_config LISTEN/NOTIFY consumer lag exceeded 5 s for 2 min. The
      # cache reflects stale tenant overrides; rate-limit decisions may use outdated
      # ceilings.
      - alert: TenantConfigReloadStalled
        expr: max(collectmind_tenant_config_cache_consumer_lag_seconds) > 5
        for: 2m
        labels:
          severity: page
          slo: SC-014
          service: collectmind
        annotations:
          summary: "SC-014: tenant_config LISTEN/NOTIFY consumer lag > 5 s"
          description: "The orchestration-api's tenant_config cache has not consumed a NOTIFY event within 5 seconds for 2 minutes. Rate-limit ceilings may be stale."
          runbook_url: observability/runbooks/tenant-config-reload-stalled.md

      # SC-012 page-tier: fires on any deployment-tenant mismatch sustained for 1 min.
      # Single-event visibility per FR-024.
      - alert: DeploymentTenantMismatch
        expr: sum(increase(collectmind_deployment_rejected_total[1m])) > 0
        for: 1m
        labels:
          severity: page
          slo: SC-012
          service: collectmind
        annotations:
          summary: "SC-012: deployer refused a tenant-vehicle mismatched policy"
          description: "The deployer-node tenant-scope check (FR-021) raised TenantVehicleMismatch; the policy was NOT deployed. Audit row kind=deployment_rejected written. Investigate operator workflow or ownership-store integrity."
          runbook_url: observability/runbooks/deployment-tenant-mismatch.md
