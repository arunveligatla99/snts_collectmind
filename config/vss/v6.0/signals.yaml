  Vehicle.Body.Windshield.Front.Wiping.Intensity:
    datatype: uint8
    description: Relative intensity/sensitivity for interval and rain sensor mode
      as requested by user/driver. Has no significance if Windshield.Wiping.Mode is
      OFF/SLOW/MEDIUM/FAST 0 - wipers inactive. 1 - minimum intensity (lowest frequency/sensitivity,
      longest interval). 2/3/4/... - higher intensity (higher frequency/sensitivity,
      shorter interval). Maximum value supported is vehicle specific.
    type: actuator
    unit: null
  Vehicle.Body.Windshield.Front.Wiping.IsWipersWorn:
    datatype: boolean
    description: Wiper wear status. True = Worn, Replacement recommended or required.
      False = Not Worn.
    type: sensor
    unit: null
  Vehicle.Body.Windshield.Front.Wiping.Mode:
    datatype: string
    description: Wiper mode requested by user/driver. INTERVAL indicates intermittent
      wiping, with fixed time interval between each wipe. RAIN_SENSOR indicates intermittent
      wiping based on rain intensity.
    type: actuator
    unit: null
  Vehicle.Body.Windshield.Front.Wiping.System.ActualPosition:
    datatype: float
    description: Actual position of main wiper blade for the wiper system relative
      to reference position. Location of reference position (0 degrees) and direction
      of positive/negative degrees is vehicle specific.
    type: actuator
    unit: degrees
  Vehicle.Body.Windshield.Front.Wiping.System.DriveCurrent:
    datatype: float
    description: Actual current used by wiper drive.
    type: sensor
    unit: A
  Vehicle.Body.Windshield.Front.Wiping.System.Frequency:
    datatype: uint8
    description: Wiping frequency/speed, measured in cycles per minute. The signal
      concerns the actual speed of the wiper blades when moving. Intervals/pauses
      are excluded, i.e. the value corresponds to the number of cycles that would
      be completed in 1 minute if wiping permanently over default range.
    type: actuator
    unit: cpm
  Vehicle.Body.Windshield.Front.Wiping.System.IsBlocked:
    datatype: boolean
    description: Indicates if wiper movement is blocked. True = Movement blocked.
      False = Movement not blocked.
    type: sensor
    unit: null
  Vehicle.Body.Windshield.Front.Wiping.System.IsEndingWipeCycle:
    datatype: boolean
    description: Indicates if current wipe movement is completed or near completion.
      True = Movement is completed or near completion. Changes to RequestedPosition
      will be executed first after reaching previous RequestedPosition, if it has
      not already been reached. False = Movement is not near completion. Any change
      to RequestedPosition will be executed immediately. Change of direction may not
      be allowed.
    type: sensor
    unit: null
  Vehicle.Body.Windshield.Front.Wiping.System.IsOverheated:
    datatype: boolean
    description: Indicates if wiper system is overheated. True = Wiper system overheated.
      False = Wiper system not overheated.
    type: sensor
    unit: null
  Vehicle.Body.Windshield.Front.Wiping.System.IsPositionReached:
    datatype: boolean
    description: Indicates if a requested position has been reached. IsPositionReached
      refers to the previous position in case the TargetPosition is updated while
      IsEndingWipeCycle=True. True = Current or Previous TargetPosition reached. False
      = Position not (yet) reached, or wipers have moved away from the reached position.
    type: sensor
    unit: null
  Vehicle.Body.Windshield.Front.Wiping.System.IsWiperError:
    datatype: boolean
    description: Indicates system failure. True if wiping is disabled due to system
      failure.
    type: sensor
    unit: null
  Vehicle.Body.Windshield.Front.Wiping.System.IsWiping:
    datatype: boolean
    description: Indicates wiper movement. True if wiper blades are moving. Change
      of direction shall be considered as IsWiping if wipers will continue to move
      directly after the change of direction.
    type: sensor
    unit: null
  Vehicle.Body.Windshield.Front.Wiping.System.Mode:
    datatype: string
    description: Requested mode of wiper system. STOP_HOLD means that the wipers shall
      move to position given by TargetPosition and then hold the position. WIPE means
      that wipers shall move to the position given by TargetPosition and then hold
      the position if no new TargetPosition is requested. PLANT_MODE means that wiping
      is disabled. Exact behavior is vehicle specific. EMERGENCY_STOP means that wiping
      shall be immediately stopped without holding the position.
    type: actuator
    unit: null
  Vehicle.Body.Windshield.Front.Wiping.System.TargetPosition:
    datatype: float
    description: Requested position of main wiper blade for the wiper system relative
      to reference position. Location of reference position (0 degrees) and direction
      of positive/negative degrees is vehicle specific. System behavior when receiving
      TargetPosition depends on Mode and IsEndingWipeCycle. Supported values are vehicle
      specific and might be dynamically corrected. If IsEndingWipeCycle=True then
      wipers will complete current movement before actuating new TargetPosition. If
      IsEndingWipeCycle=False then wipers will directly change destination if the
      TargetPosition is changed.
    type: actuator
    unit: degrees
  Vehicle.Body.Windshield.Front.Wiping.WiperWear:
    datatype: uint8
    description: Wiper wear as percent. 0 = No Wear. 100 = Worn. Replacement required.
      Method for calculating or estimating wiper wear is vehicle specific. For windshields
      with multiple wipers the wear reported shall correspond to the most worn wiper.
    type: sensor
    unit: percent
