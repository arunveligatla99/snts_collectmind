components:
  schemas:
    AuditEvent:
      description: Audit event projection returned to operator (subset of audit_events
        row).
      properties:
        correlation_id:
          title: Correlation Id
          type: string
        event_id:
          title: Event Id
          type: string
        extras:
          anyOf:
          - type: object
          - type: 'null'
          title: Extras
        kind:
          title: Kind
          type: string
        occurred_at:
          title: Occurred At
          type: string
        tenant_id:
          title: Tenant Id
          type: string
      required:
      - event_id
      - tenant_id
      - kind
      - correlation_id
      - occurred_at
      title: AuditEvent
      type: object
    AuditEventList:
      properties:
        events:
          items:
            $ref: '#/components/schemas/AuditEvent'
          title: Events
          type: array
        total:
          title: Total
          type: integer
      required:
      - events
      - total
      title: AuditEventList
      type: object
    BreakGlassRequest:
      description: Request body for ``POST /api/v1/audit/break-glass/query`` (per
        audit-admin.v1.yaml).
      properties:
        correlation_id:
          maxLength: 64
          minLength: 1
          pattern: ^[a-zA-Z0-9_-]+$
          title: Correlation Id
          type: string
        reason_code:
          enum:
          - incident_response
          - legal_hold
          - regulator_request
          - support_escalation
          - operator_self_audit
          title: Reason Code
          type: string
        tenant_scope:
          maxLength: 64
          minLength: 1
          pattern: ^[a-zA-Z0-9_-]+$
          title: Tenant Scope
          type: string
      required:
      - tenant_scope
      - correlation_id
      - reason_code
      title: BreakGlassRequest
      type: object
    ErasureRequest:
      additionalProperties: false
      properties:
        mode:
          default: erased
          enum:
          - erased
          - redacted
          title: Mode
          type: string
        subject_identifier:
          minLength: 1
          title: Subject Identifier
          type: string
        subject_kind:
          enum:
          - vehicle
          - finding
          - principal
          title: Subject Kind
          type: string
      required:
      - subject_kind
      - subject_identifier
      title: ErasureRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  title: CollectMind Orchestration API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/audit/break-glass/query:
    post:
      description: "Cross-tenant audit-events read under elevated audit.\n\nSteps\
        \ (in this order, inside a single service-principal transaction):\n    1.\
        \ INSERT atomic ``kind=break_glass`` row recording the operator + scope +\
        \ reason.\n    2. SELECT the named tenant_scope's audit_events for the named\
        \ correlation_id.\n    3. Return the rows.\n\nStep (1) is FIRST so an audit-write\
        \ failure aborts the txn BEFORE the SELECT result is\nmaterialized. ``ON CONFLICT\
        \ DO NOTHING`` on the audit writer means a retried invocation\nwith the same\
        \ correlation_id is idempotent on the audit chain (one row per incident)."
      operationId: break_glass_query_api_v1_audit_break_glass_query_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BreakGlassRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventList'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Break Glass Query
      tags:
      - break-glass
  /api/v1/audit/{correlation_id}:
    get:
      operationId: audit_for_correlation_api_v1_audit__correlation_id__get
      parameters:
      - in: path
        name: correlation_id
        required: true
        schema:
          title: Correlation Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Audit For Correlation
  /api/v1/erasure-requests:
    post:
      operationId: submit_erasure_request_api_v1_erasure_requests_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErasureRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Submit Erasure Request
  /api/v1/erasure-requests/{request_id}:
    get:
      operationId: erasure_request_status_api_v1_erasure_requests__request_id__get
      parameters:
      - in: path
        name: request_id
        required: true
        schema:
          title: Request Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Erasure Request Status
  /api/v1/findings:
    post:
      operationId: post_finding_api_v1_findings_post
      parameters:
      - in: header
        name: X-Telemetry-Simulator-Directive
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Telemetry-Simulator-Directive
      - in: header
        name: X-Time-Acceleration-Factor
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Time-Acceleration-Factor
      responses:
        '202':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Post Finding
  /api/v1/findings/{finding_id}/outcome:
    get:
      operationId: outcome_for_finding_api_v1_findings__finding_id__outcome_get
      parameters:
      - in: path
        name: finding_id
        required: true
        schema:
          title: Finding Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Outcome For Finding
  /api/v1/policies/{policy_id}:
    get:
      operationId: get_policy_api_v1_policies__policy_id__get
      parameters:
      - in: path
        name: policy_id
        required: true
        schema:
          title: Policy Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Policy
  /api/v1/policies/{policy_id}/versions:
    get:
      operationId: list_policy_versions_api_v1_policies__policy_id__versions_get
      parameters:
      - in: path
        name: policy_id
        required: true
        schema:
          title: Policy Id
          type: string
      - in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Policy Versions
  /api/v1/tenant-config/self:
    get:
      description: 'T241: tenant introspects own rate-limit config. FR-013 / FR-013a.


        Cache-first with Postgres fallback per ADR-0008 Part 4. Returns FR-012 defaults

        if no override row exists for the tenant. Tenant cannot read another tenant''s
        row

        (RESTRICTIVE RLS on tenant_config refuses cross-tenant SELECT; the cache key
        is the

        JWT-derived tenant_id so cross-tenant cache poisoning is impossible by construction).'
      operationId: get_own_tenant_config_api_v1_tenant_config_self_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get Own Tenant Config
  /api/v1/vehicle-groups/{group_id}/active-policy:
    get:
      operationId: active_policy_for_group_api_v1_vehicle_groups__group_id__active_policy_get
      parameters:
      - in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Active Policy For Group
