components:
  schemas:
    ErasureRequest:
      additionalProperties: false
      properties:
        mode:
          default: erased
          enum:
          - erased
          - redacted
          title: Mode
          type: string
        subject_identifier:
          minLength: 1
          title: Subject Identifier
          type: string
        subject_kind:
          enum:
          - vehicle
          - finding
          - principal
          title: Subject Kind
          type: string
      required:
      - subject_kind
      - subject_identifier
      title: ErasureRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  title: CollectMind Orchestration API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/audit/{correlation_id}:
    get:
      operationId: audit_for_correlation_api_v1_audit__correlation_id__get
      parameters:
      - in: path
        name: correlation_id
        required: true
        schema:
          title: Correlation Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Audit For Correlation
  /api/v1/erasure-requests:
    post:
      operationId: submit_erasure_request_api_v1_erasure_requests_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErasureRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Submit Erasure Request
  /api/v1/erasure-requests/{request_id}:
    get:
      operationId: erasure_request_status_api_v1_erasure_requests__request_id__get
      parameters:
      - in: path
        name: request_id
        required: true
        schema:
          title: Request Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Erasure Request Status
  /api/v1/findings:
    post:
      operationId: post_finding_api_v1_findings_post
      parameters:
      - in: header
        name: X-Telemetry-Simulator-Directive
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Telemetry-Simulator-Directive
      - in: header
        name: X-Time-Acceleration-Factor
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Time-Acceleration-Factor
      responses:
        '202':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Post Finding
  /api/v1/findings/{finding_id}/outcome:
    get:
      operationId: outcome_for_finding_api_v1_findings__finding_id__outcome_get
      parameters:
      - in: path
        name: finding_id
        required: true
        schema:
          title: Finding Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Outcome For Finding
  /api/v1/policies/{policy_id}:
    get:
      operationId: get_policy_api_v1_policies__policy_id__get
      parameters:
      - in: path
        name: policy_id
        required: true
        schema:
          title: Policy Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Policy
  /api/v1/policies/{policy_id}/versions:
    get:
      operationId: list_policy_versions_api_v1_policies__policy_id__versions_get
      parameters:
      - in: path
        name: policy_id
        required: true
        schema:
          title: Policy Id
          type: string
      - in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Policy Versions
  /api/v1/vehicle-groups/{group_id}/active-policy:
    get:
      operationId: active_policy_for_group_api_v1_vehicle_groups__group_id__active_policy_get
      parameters:
      - in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Active Policy For Group
