name: collectmind

services:
  postgres-timescale:
    image: timescale/timescaledb-ha:pg16
    container_name: collectmind-postgres
    environment:
      POSTGRES_USER: collectmind
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: collectmind
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ../../src/collectmind/registry/migrations/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collectmind -d collectmind"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: collectmind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  kafka:
    image: apache/kafka:3.9.0
    container_name: collectmind-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30

  kafka-init:
    image: apache/kafka:3.9.0
    container_name: collectmind-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./init-kafka-topics.sh:/init-kafka-topics.sh:ro
    entrypoint: ["bash", "/init-kafka-topics.sh"]
    restart: "no"

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: collectmind-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../observability/prometheus:/etc/prometheus/rules:ro
    depends_on:
      alertmanager:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/healthy >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: collectmind-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yaml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.listen-address=:9093
    depends_on:
      local-webhook:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9093/-/ready >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30

  local-webhook:
    image: python:3.11-slim
    container_name: collectmind-local-webhook
    ports:
      - "9099:9099"
    volumes:
      - ../../scripts/local_webhook.py:/app/local_webhook.py:ro
    working_dir: /app
    command: ["python", "/app/local_webhook.py"]
    environment:
      LOCAL_WEBHOOK_HOST: "0.0.0.0"
      LOCAL_WEBHOOK_PORT: "9099"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9099/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 30

  grafana:
    image: grafana/grafana:11.4.0
    container_name: collectmind-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: localdev
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30

  tempo:
    image: grafana/tempo:2.7.0
    container_name: collectmind-tempo
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
    volumes:
      - ./tempo-config.yml:/etc/tempo.yml:ro

  loki:
    image: grafana/loki:3.3.2
    container_name: collectmind-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro

  mock-issuer:
    build: ./mock-issuer
    container_name: collectmind-mock-issuer
    ports:
      - "8088:8088"
    volumes:
      - ./issuer-config.yaml:/app/issuer-config.yaml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/.well-known/jwks.json')"]
      interval: 10s
      timeout: 5s
      retries: 30

  orchestration-api:
    build:
      context: ../..
      dockerfile: infra/compose/orchestration-api/Dockerfile
    container_name: collectmind-orchestration-api
    environment:
      OAUTH2_ISSUER_URL: http://mock-issuer:8088
      OAUTH2_AUDIENCE: collectmind-api
      POSTGRES_DSN: postgresql://collectmind:localdev@postgres-timescale:5432/collectmind
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTLP_ENDPOINT: http://tempo:4317
      TIME_ACCELERATION_FACTOR: "10000.0"
      LOG_LEVEL: INFO
    ports:
      - "8081:8000"
    depends_on:
      postgres-timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mock-issuer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')\""]
      interval: 10s
      timeout: 10s
      retries: 30

volumes:
  pgdata:
