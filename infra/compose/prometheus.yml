global:
  scrape_interval: 2s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: orchestration-api
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestration-api:8000"]

  - job_name: mock-issuer
    metrics_path: /metrics
    static_configs:
      - targets: ["mock-issuer:8088"]
