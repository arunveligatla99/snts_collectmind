global:
  resolve_timeout: 1m

route:
  group_by: ["alertname"]
  group_wait: 5s
  group_interval: 10s
  repeat_interval: 1h
  receiver: local-webhook
  routes:
    - matchers:
        - service="collectmind"
      receiver: local-webhook

receivers:
  - name: local-webhook
    webhook_configs:
      - url: http://local-webhook:9099/webhook
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="page"
    equal: ["alertname", "service"]
