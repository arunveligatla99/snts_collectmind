global:
  resolve_timeout: 1m

# Severity-tier routing (Phase 5 standardization):
# - critical -> pages immediately (group_wait 0s).
# - page     -> warning-tier; grouped with longer wait so a transient signal
#               doesn't fan out unless it persists. Suppressed by an inhibit
#               rule when a critical alert for the same alertname+service is
#               already firing.
# Both tiers terminate at the local webhook receiver in dev; in cloud
# (configured via the observability Terraform module) they fan out to
# PagerDuty + Slack.

route:
  group_by: ["alertname", "service"]
  group_wait: 5s
  group_interval: 10s
  repeat_interval: 1h
  receiver: local-webhook
  routes:
    # Phase 13 T280: BreakGlassInvoked routes per (operator_subject, reason_code)
    # so each operator's invocation produces a distinct page even when fired close
    # together. Operational requirement is single-event visibility per FR-005a/SC-013.
    - matchers:
        - alertname="BreakGlassInvoked"
      receiver: local-webhook
      group_by: ["alertname", "service", "operator_subject", "reason_code"]
      group_wait: 0s
      group_interval: 15s
      repeat_interval: 1h
    - matchers:
        - severity="critical"
      receiver: local-webhook
      group_wait: 0s
      repeat_interval: 30m
    - matchers:
        - severity="page"
      receiver: local-webhook
      group_wait: 30s

receivers:
  - name: local-webhook
    webhook_configs:
      - url: http://local-webhook:9099/webhook
        send_resolved: true

inhibit_rules:
  # When a critical SLO-breach alert is firing for a given (alertname, service)
  # tuple, suppress any warning-tier (severity=page) alert for the same tuple.
  # Prevents page duplication when a warning tier promotes into a critical.
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="page"
    equal: ["alertname", "service"]
